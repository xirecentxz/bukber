<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Bukber Spesial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 p-md-5 mx-3">
        <div class="card-body text-center">
            <h1 class="mb-4 display-6 fw-bold gradient-text">YUK, BUKBER TANGGAL 19 MARET 2026!</h1>
            <p class="text-light mb-5 small opacity-75">Kehadiranmu sangat diharapkan (dan tidak bisa ditolak).</p>
            
            <div class="d-flex justify-content-center gap-3">
                <button id="btn-iya" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow" 
                        onclick="showSuccess()">IYA</button>
                
                <button id="btn-tidak" class="btn btn-danger btn-lg rounded-pill px-5 fw-bold shadow" 
                        tabindex="-1">TIDAK</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
