<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Bukber</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Mengunci layar dari scroll */
            color: white;
            /* Memastikan area body mengambil referensi layar penuh */
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 40px;
            line-height: 1.3;
            background: -webkit-linear-gradient(45deg, #facc15, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(250, 204, 21, 0.2);
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* Tombol IYA */
        #btn-iya {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }

        #btn-iya:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.6);
        }

        #btn-iya:active {
            transform: translateY(1px);
        }

        /* Tombol TIDAK */
        #btn-tidak {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            position: relative; /* Posisi awal rapi di sebelah IYA */
            transition: top 0.2s ease-out, left 0.2s ease-out; 
            z-index: 9999; /* Selalu berada di lapisan paling atas */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>YUK, BUKBER TANGGAL 19</h1>
        <div class="button-container">
            <button id="btn-iya" onclick="alert('Mantap! Langsung diamankan kursinya. Jangan sampai telat ya!')">IYA</button>
            <button id="btn-tidak" tabindex="-1" onclick="return false;">TIDAK</button>
        </div>
    </div>

    <script>
        const btnTidak = document.getElementById('btn-tidak');

        function lari() {
            // Ubah menjadi fixed agar tombol terlepas dari tata letak dan berpatokan murni pada ukuran layar
            btnTidak.style.position = 'fixed';

            // Mengambil ukuran layar yang benar-benar terlihat
            const lebarLayar = window.innerWidth;
            const tinggiLayar = window.innerHeight;

            // Mengambil ukuran fisik tombol itu sendiri
            const lebarTombol = btnTidak.offsetWidth;
            const tinggiTombol = btnTidak.offsetHeight;

            // Jarak aman (padding) dari tepi layar agar tidak terpotong
            const jarakAman = 20;

            // Menghitung batas maksimal koordinat agar tombol tidak keluar jalur
            const batasMaxX = lebarLayar - lebarTombol - jarakAman;
            const batasMaxY = tinggiLayar - tinggiTombol - jarakAman;

            // Mengacak koordinat baru dengan batas minimal (jarakAman) dan maksimal (batasMax)
            const randomX = Math.floor(Math.random() * (batasMaxX - jarakAman + 1)) + jarakAman;
            const randomY = Math.floor(Math.random() * (batasMaxY - jarakAman + 1)) + jarakAman;

            // Memindahkan tombol
            btnTidak.style.left = randomX + 'px';
            btnTidak.style.top = randomY + 'px';
        }

        // Trigger 1: Untuk Mouse di Laptop/PC
        btnTidak.addEventListener('mouseover', lari);

        // Trigger 2: Untuk Layar Sentuh di HP/Tablet
        btnTidak.addEventListener('touchstart', function(event) {
            event.preventDefault(); // Mencegah klik paksa
            lari();
        }, { passive: false });
    </script>

</body>
</html>
